# 프로덕션 환경용 Docker Compose 파일 (Traefik 없이 HTTP만 사용)
# 사용법: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  # PostgreSQL 데이터베이스
  db:
    container_name: ${PROJECT_NAME}-prod-db
    image: postgres:17
    restart: always
    volumes:
      - prod-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env.prod
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - default

  # Adminer - 데이터베이스 관리 도구
  adminer:
    container_name: ${PROJECT_NAME}-prod-adminer
    image: adminer
    restart: always
    ports:
      - "8080:8080"  # http://your-server:8080
    depends_on:
      - db
    env_file:
      - .env.prod
    environment:
      - ADMINER_DESIGN=pepa-linha-dark
    networks:
      - default

  # 백엔드 사전 시작 스크립트 (마이그레이션 등)
  prestart:
    container_name: ${PROJECT_NAME}-prod-prestart
    image: ${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG:-latest}
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bash scripts/prestart.sh
    env_file:
      - .env.prod
    environment:
      - FRONTEND_HOST=http://${DOMAIN}:3000
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
    networks:
      - default

  # FastAPI 백엔드
  backend:
    container_name: ${PROJECT_NAME}-prod-backend
    image: ${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG:-latest}
    build:
      context: ./backend
    restart: always
    ports:
      - "8000:8000"  # http://your-server:8000
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env.prod
    environment:
      - FRONTEND_HOST=http://${DOMAIN}:3000
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # React 프론트엔드
  frontend:
    container_name: ${PROJECT_NAME}-prod-frontend
    image: ${DOCKER_IMAGE_FRONTEND?Variable not set}:${TAG:-latest}
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://${DOMAIN?Variable not set}:8000
        - NODE_ENV=production
    restart: always
    ports:
      - "3000:80"  # http://your-server:3000
    env_file:
      - .env.prod
    networks:
      - default

volumes:
  # 프로덕션 데이터베이스 데이터
  prod-db-data:
    driver: local

networks:
  # 내부 네트워크
  default:
    name: fastapi-prod-network
    driver: bridge
